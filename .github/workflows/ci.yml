name: AutoGenius CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Find frontend directory
        run: find . -name "package.json" -not -path "*/node_modules/*" -maxdepth 3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd react-dashboard && npm install

      - name: Build frontend
        run: |
          cd react-dashboard && npm run build

  backend:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn python-dotenv requests langchain-groq langchain-core

      - name: Check syntax
        run: |
          cd api && python -m py_compile main.py && echo "Backend syntax OK"