name: AutoGenius CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./react-dashboard
        run: npm install

      - name: Build frontend
        working-directory: ./react-dashboard
        run: npm run build

  backend:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./api
        run: |
          pip install fastapi uvicorn python-dotenv requests langchain-groq langchain-core

      - name: Check syntax
        working-directory: ./api
        run: python -m py_compile main.py && echo "Backend syntax OK"